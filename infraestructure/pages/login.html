<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="icon" type="image/x-icon" href="../assets//images/Hotel_Guest.ico">
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
    <div class="login-container">
        <h1>Login de usuário</h1>
        <form id="login">
            <label for="nome">Nome:</label>
            <br>
            <input type="text" id ="nome" name"nome" required placeholder="Digite seu nome">
            <br>

            <label for="email">Email</label>
            <br>
            <input type="email" id="email" name"email" required placeholder="Digite seu email">
            <br>

            <label for="password">Senha</label>
            <br>
            <input type="password" id="password" name"password" min="6" max="18" placeholder="Digite sua senha" title="A senha deve ter pelo menos 6 caracteres
            ">
            <br>

            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </form>
    </div>

        <script>
    document.getElementById('login').addEventListener('submit', function(event) {
        event.preventDefault();
        
     
        window.location.href = "../pages/tabelalogin.html"; 
    });
</script>
</body>
</html>
