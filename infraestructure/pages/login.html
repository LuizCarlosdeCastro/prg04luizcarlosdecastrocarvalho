<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" type="image/x-icon" href="../assets//images/Hotel_Guest.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="d-flex align-items-center py-4 bg-light" style="min-height: 100vh; background-color: var(--cor-fundo) !important;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-8 col-md-6 col-lg-4">
                
                <div class="card shadow border-0 p-4">
                    <div class="text-center mb-4">
                        <h1 class="h3 mb-3 fw-normal">Login de usuário</h1>
                    </div>

                    <form id="login">
                        <div class="mb-3 text-start">
                            <label for="nome" class="form-label fw-bold">Nome:</label>
                            <input type="text" class="form-control" id="nome" name="nome" required placeholder="Digite seu nome">
                        </div>

                        <div class="mb-3 text-start">
                            <label for="email" class="form-label fw-bold">E-mail:</label>
                            <input type="email" class="form-control" id="email" name="email" required placeholder="Digite seu e-mail">
                        </div>

                        <div class="mb-4 text-start">
                            <label for="password" class="form-label fw-bold">Senha:</label>
                            <input type="password" class="form-control" id="password" name="password" minlength="6" maxlength="18" placeholder="Digite sua senha">
                            <div class="form-text">Mínimo de 6 caracteres.</div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary" style="background-color: var(--cor-primaria); border: none;">
                                Enviar
                            </button>
                            <button type="reset" class="btn btn-outline-secondary">
                                Limpar
                            </button>
                        </div>
                    </form>
                </div>

                <div class="text-center mt-3">
                    <a href="../index.html" class="text-decoration-none text-dark small">← Voltar para a Home</a>
                </div>

            </div>
        </div>
    </div>

        <script>
    document.getElementById('login').addEventListener('submit', function(event) {
        event.preventDefault();
        
     
        window.location.href = "../pages/tabelalogin.html"; 
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
